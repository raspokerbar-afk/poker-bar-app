<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Poker Bar Point - テスト用</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
  <h1>🎲 Poker Bar Point (テスト)</h1>
  <h2 id="points">0 pt</h2>
  <button id="addBtn">+10 pt</button>
  <div id="log" style="color:red; margin-top:10px;"></div>

  <script>
    const supabaseUrl = "https://sqtfiadufcxdzyctrlqp.supabase.co";
    const supabaseKey = "ここにanon_public_keyを貼る";
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    const TEST_USER_ID = "TEST_USER";
    const pointsElem = document.getElementById("points");
    const addBtn = document.getElementById("addBtn");
    const logElem = document.getElementById("log");

    async function loadPoints() {
      let { data, error } = await supabase
        .from("customers")
        .select("points")
        .eq("line_id", TEST_USER_ID)
        .single();

      if (error) {
        logElem.innerText = "select error: " + JSON.stringify(error);
        pointsElem.innerText = "0 pt";
        return;
      }

      if (!data) {
        const { error: insertError } = await supabase
          .from("customers")
          .insert([{ line_id: TEST_USER_ID, points: 0 }]);
        if (insertError) logElem.innerText = "insert error: " + JSON.stringify(insertError);

        pointsElem.innerText = "0 pt";
      } else {
        pointsElem.innerText = (data.points ?? 0) + " pt";
      }
    }

    async function addPoint() {
      let { data, error } = await supabase
        .from("customers")
        .select("points")
        .eq("line_id", TEST_USER_ID)
        .single();

      if (error) {
        logElem.innerText = "select error: " + JSON.stringify(error);
        return;
      }

      const currentPoints = data?.points ?? 0;
      const newPoint = currentPoints + 10;

      const { data: upsertData, error: upsertError } = await supabase
        .from("customers")
        .upsert({ line_id: TEST_USER_ID, points: newPoint });

      if (upsertError) {
        logElem.innerText = "upsert error: " + JSON.stringify(upsertError);
        return;
      }

      logElem.innerText = "ポイント更新成功: " + newPoint;
      pointsElem.innerText = newPoint + " pt";
    }

    loadPoints();
    addBtn.addEventListener("click", addPoint);
  </script>
</body>
</html>
