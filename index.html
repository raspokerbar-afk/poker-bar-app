<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Poker Bar Point</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <h1>🎲 Poker Bar Point</h1>
  <h2 id="points">0 pt</h2>
  <button id="addBtn" onclick="addPoint()" disabled>+10 pt</button>

  <script>
    // 🔥 ここにあなたの情報を入れる
    const supabaseUrl = "https://sqtfiadufcxdzyctrlqp.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNxdGZpYWR1ZmN4ZHp5Y3RybHFwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNDU0OTgsImV4cCI6MjA4NzYyMTQ5OH0.P-M_0BrxNLMYhOB_mrkDqMkHZCA0bII5J8Y9fExJbJs";

    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    async function init() {
      await liff.init({ liffId: "2009179870-S4WxTDaK" });

      if (!liff.isLoggedIn()) {
        liff.login();
      }

      const profile = await liff.getProfile();
      const userId = profile.userId;

      let { data, error } = await supabase
        .from("customers")
        .select("*")
        .eq("line_id", userId)
        .single();

      if (!data) {
        await supabase.from("customers").insert([
          { line_id: userId, points: 0 }
        ]);
        document.getElementById("points").innerText = "0 pt";
      } else {
        document.getElementById("points").innerText = data.points + " pt";
      }

      window.currentUserId = userId;
document.getElementById("addBtn").disabled = false;
    }

    async function addPoint() {
      let { data } = await supabase
        .from("customers")
        .select("points")
        .eq("line_id", window.currentUserId)
        .single();

      const newPoint = data.points + 10;

      await supabase
        .from("customers")
        .update({ points: newPoint })
        .eq("line_id", window.currentUserId);

      document.getElementById("points").innerText = newPoint + " pt";
    }

    init();
  </script>
</body>
</html>
